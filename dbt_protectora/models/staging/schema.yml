version: 2

models:
  - name: stg_perros
    description: Perros activos en el sistema
    columns:
      - name: id
        tests: [unique, not_null]
      - name: nombre
        tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: sexo
        tests:
          - accepted_values:
              values: ['macho', 'hembra']
      - name: estado
        tests:
          - accepted_values:
              values: ['activo', 'adoptado', 'fallecido']

  - name: stg_vacunas
    description: Historial de vacunaciones
    tests:
      - dbt_utils.expression_is_true:
          expression: "fecha_proxima is null or fecha_proxima > fecha_administracion"
          severity: warn
    columns:
      - name: id
        tests: [unique, not_null]
      - name: perro_id
        tests: [not_null]

  - name: stg_ubicaciones
    description: Historial de ubicaciones de cada perro
    columns:
      - name: id
        tests: [unique, not_null]
      - name: perro_id
        tests: [not_null]
      - name: tipo
        tests:
          - accepted_values:
              values: ['refugio', 'acogida', 'residencia', 'adoptado']

  - name: stg_voluntarios
    description: Voluntarios de la protectora
    columns:
      - name: id
        tests: [unique, not_null]
      - name: nombre
        tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: apellido
        tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: email
        tests: [unique, not_null]

  - name: stg_turnos_voluntarios
    description: Registro de turnos por voluntario
    columns:
      - name: id
        tests: [unique, not_null]
      - name: voluntario_id
        tests: [not_null]
      - name: franja
        tests:
          - accepted_values:
              values: ['manana', 'tarde']
      - name: estado
        tests:
          - accepted_values:
              values: ['realizado', 'medio_turno', 'falta_justificada', 'falta_injustificada', 'no_apuntado']

  - name: stg_perros_entrada
    description: Perros del xlsx con datos limpios y normalizados, pendientes de cargar en la app
    columns:
      - name: nombre
        tests: [not_null]
      - name: num_chip
        tests: [unique, not_null]
      - name: sexo
        tests:
          - accepted_values:
              values: ['macho', 'hembra']
      - name: tipo_ubicacion
        tests:
          - accepted_values:
              values: ['refugio', 'acogida', 'residencia']
      - name: fecha_entrada
        tests:
          - not_null:
              severity: warn
              config:
                error_if: ">10"
                warn_if: ">0"
