protectora:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      port: 5432
      user: postgres
      password: "{{ env_var('DBT_PASSWORD') }}"
      dbname: protectora
      schema: analytics
      threads: 4
    prod:
      type: postgres
      host: "{{ env_var('DBT_NEON_HOST') }}"
      port: 5432
      user: "{{ env_var('DBT_NEON_USER') }}"
      password: "{{ env_var('DBT_NEON_PASSWORD') }}"
      dbname: "{{ env_var('DBT_NEON_DBNAME') }}"
      schema: analytics
      threads: 4
      sslmode: require
