{% extends "base.html" %}
{% block title %}Editar mis datos{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <a href="/voluntarios/{{ voluntario.id }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0">Editar mis datos</h2>
</div>

<div class="card p-4" style="max-width:560px;">
  <form method="post" action="/voluntarios/{{ voluntario.id }}/editar-datos">
    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label fw-semibold">Nombre *</label>
        <input type="text" name="nombre" class="form-control" required
               value="{{ voluntario.nombre }}">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Apellidos *</label>
        <input type="text" name="apellido" class="form-control" required
               value="{{ voluntario.apellido }}">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Teléfono</label>
        <input type="text" name="telefono" class="form-control"
               value="{{ voluntario.telefono or '' }}">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Fecha de alta</label>
        <input type="date" name="fecha_alta" class="form-control"
               value="{{ voluntario.fecha_alta }}">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Fecha veterano</label>
        <input type="date" name="fecha_veterano" class="form-control"
               value="{{ voluntario.fecha_veterano.isoformat() if voluntario.fecha_veterano else '' }}">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">DNI</label>
        <input type="text" name="dni" class="form-control"
               value="{{ voluntario.dni or '' }}"
               placeholder="12345678A">
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Email *</label>
        <input type="email" name="email" class="form-control" required
               value="{{ voluntario.email or '' }}">
      </div>

      <div class="col-12">
        <label class="form-label fw-semibold">Dirección</label>
        <input type="text" name="direccion" class="form-control"
               value="{{ voluntario.direccion or '' }}"
               placeholder="Calle, número, piso…">
      </div>

      <div class="col-md-5">
        <label class="form-label fw-semibold">Ciudad</label>
        <input type="text" name="ciudad" class="form-control"
               value="{{ voluntario.ciudad or '' }}">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold">Provincia</label>
        <input type="text" name="provincia" class="form-control"
               value="{{ voluntario.provincia or '' }}">
      </div>

      <div class="col-md-3">
        <label class="form-label fw-semibold">Código postal</label>
        <input type="text" name="codigo_postal" class="form-control"
               value="{{ voluntario.codigo_postal or '' }}">
      </div>

    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-lg me-1"></i>Guardar cambios
      </button>
      <a href="/voluntarios/{{ voluntario.id }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
