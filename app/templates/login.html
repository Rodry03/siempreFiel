<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceder — Siempre Fiel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a5276 0%, #154360 100%); min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="card shadow-lg" style="width:360px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-heart-fill text-danger fs-2"></i>
        <h4 class="fw-bold mt-2 mb-0">Siempre Fiel</h4>
        <small class="text-muted">Gestión de refugio</small>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Acceder
        </button>
      </form>
    </div>
  </div>
</body>
</html>
