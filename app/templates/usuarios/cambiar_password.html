{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <h2 class="fw-bold mb-0">Cambiar contraseña</h2>
</div>

<div class="card" style="max-width:420px;">
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/usuarios/cambiar-password">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Contraseña actual *</label>
          <input type="password" name="password_actual" class="form-control" required autofocus>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Nueva contraseña *</label>
          <input type="password" name="password_nuevo" class="form-control" required minlength="6">
          <div class="form-text">Mínimo 6 caracteres.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Confirmar nueva contraseña *</label>
          <input type="password" name="password_confirmar" class="form-control" required minlength="6">
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Actualizar contraseña
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
